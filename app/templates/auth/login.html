{% extends "base.html" %}

{% block title %}Login - Excel Analyzer{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-5 col-lg-4">
    <h1 class="h4 mb-3">Log in</h1>

    <form method="post">
      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input id="username" name="username" class="form-control" autocomplete="username">
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input id="password" name="password" type="password" class="form-control" autocomplete="current-password">
      </div>

      <button type="submit" class="btn btn-primary w-100">Log in</button>
    </form>
  </div>
</div>
{% endblock %}
